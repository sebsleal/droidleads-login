name: Refresh Leads & Storm Data

on:
  schedule:
    # Runs every 6 hours at :00 — Claude enrichment automation runs at :47
    - cron: "0 */6 * * *"
  workflow_dispatch: # allow manual runs from GitHub UI

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Validate required secrets
        run: |
          test -n "$SUPABASE_URL" || { echo "Missing SUPABASE_URL secret"; exit 1; }
          test -n "$SUPABASE_SERVICE_ROLE_KEY" || { echo "Missing SUPABASE_SERVICE_ROLE_KEY secret"; exit 1; }

      - name: Run scraper pipeline
        run: python3 run_scraper.py

      - name: Commit refreshed data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/leads.json public/storm_candidates.json
          if git diff --cached --quiet; then
            echo "No changes to commit — data unchanged."
          else
            git commit -m "chore: refresh leads $(date -u '+%Y-%m-%d')"
            git push
          fi
